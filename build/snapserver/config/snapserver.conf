[server]
datadir = /var/lib/snapserver

[stream]
sampleformat = 192000:32:2
codec = flac
chunk_ms = 20
buffer = 3000

source = pipe:///audio/snapfifo?name=MPD&mode=create&sampleformat=192000:32:2

[http]
enabled = true
bind_to_address = 0.0.0.0
port = 1780
doc_root = /usr/share/snapweb

[tcp]
enabled = true
bind_to_address = 0.0.0.0
port = 1705

[logging]
filter = *:info
