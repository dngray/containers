# Core Directory & Database Paths
music_directory         "/var/lib/mpd/music/library"
playlist_directory      "/var/lib/mpd/playlists"
db_file                 "/var/lib/mpd/data/database"
state_file              "/var/lib/mpd/data/state"
sticker_file            "/var/lib/mpd/data/sticker.sql"
pid_file                "/run/mpd/mpd.pid"

# System Execution Identity & Settings
user                    "mpd"
bind_to_address         "0.0.0.0"
port                    "6600"
auto_update             "yes"
zeroconf_enabled        "no"
filesystem_charset      "UTF-8"

# Input Engine Plugins
input {
    plugin "curl"
}

# Ultra-High-Quality Resampler Engine
# Keeps data delivery perfectly stable to prevent occasional buffer pops
resampler {
    plugin              "soxr"
    quality             "high"
}

# High-Resolution Audio Broadcast Output
audio_output {
    type                "fifo"
    name                "SnapcastPipe"
    path                "/audio/snapfifo"
    format              "192000:32:2"
    mixer_type          "software"
}
