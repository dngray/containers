name: grafana
services:
  grafana:
    extends:
      file: ../_common/app.yml
      service: app
    image: docker.io/grafana/grafana:12.3.1-ubuntu
    container_name: grafana
    hostname: grafana
    read_only: true
    user: 2003:2003
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file: grafana.env
    volumes:
      - /opt/appdata/grafana/:/var/lib/grafana
    # depends_on:
    #   - influxdb
    healthcheck:
      test: curl -f http://grafana:9000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      frontend:
        ipv4_address: 172.27.0.2
      powerwall_pypowerwall_backend:
      powerwall_influxdb_backend:

networks:
  frontend:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.27.0.0/16
        - subnet: fd27:1::/48
  powerwall_pypowerwall_backend:
    external: true
  powerwall_influxdb_backend:
    external: true
