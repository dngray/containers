name: powerwall
services:
  influxdb:
    extends:
      file: powerwall_common.yml
      service: powerwall_apps
    image: docker.io/influxdb:1.8
    container_name: influxdb
    hostname: influxdb
    user: "${PWD_USER:-1000:1000}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./data/influxdb.conf:/etc/influxdb/influxdb.conf:ro
      - /opt/appdata/influxdb:/var/lib/influxdb
    networks:
      influxdb_backend:
        ipv4_address: 172.29.0.2
    healthcheck:
      test: curl -f http://influxdb:8086/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  pypowerwall:
    extends:
      file: powerwall_common.yml
      service: powerwall_apps
    image: docker.io/jasonacox/pypowerwall:0.15.10t90
    container_name: pypowerwall
    hostname: pypowerwall
    environment:
      - PW_AUTH_PATH=/app/.auth
    env_file: ./data/pypowerwall.env
    volumes:
      - /opt/appdata/pypowerwall/.auth:/app/.auth
    networks:
      pypowerwall_backend:
        ipv4_address: 172.28.0.2
      traefik:
    healthcheck:
      test: wget --spider -q http://pypowerwall:8675/api/site_info || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  telegraf:
    extends:
      file: powerwall_common.yml
      service: powerwall_apps
    image: docker.io/telegraf:1.28.2
    container_name: telegraf
    hostname: telegraf
    user: "${PWD_USER:-1000:1000}"
    command: [
      "telegraf",
      "--config",
      "/etc/telegraf/telegraf.conf",
      "--config-directory",
      "/etc/telegraf/telegraf.d"
    ]
    volumes:
      - ./data/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    networks:
      - influxdb_backend
      - pypowerwall_backend
    depends_on:
      - influxdb
      - pypowerwall
    healthcheck:
      test: pgrep telegraf || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  weather:
    extends:
      file: powerwall_common.yml
      service: powerwall_apps
    image: docker.io/jasonacox/weather411:0.2.3
    container_name: weather411
    hostname: weather411
    user: "${PWD_USER:-1000:1000}"
    ports:
      - 127.0.0.1:8676:8676
    environment:
      - WEATHERCONF=/var/lib/weather/weather411.conf
    volumes:
      - ./data/weather411.conf:/var/lib/weather/weather411.conf:ro
    networks:
      - influxdb_backend
    depends_on:
      - influxdb
    healthcheck:
      test: wget --spider -q http://weather411:8676/stats || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  grafana:
    extends:
      file: ../_common/app.yml
      service: app
    image: docker.io/grafana/grafana:12.3.1-ubuntu
    container_name: grafana
    hostname: grafana
    user: "${PWD_USER:-1000:1000}"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file: ./data/grafana.env
    volumes:
      - /opt/appdata/grafana/:/var/lib/grafana
    depends_on:
      - influxdb
    healthcheck:
      test: curl -f http://grafana:9000/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      pypowerwall_backend:
      influxdb_backend:
      traefik:

networks:
  pypowerwall_backend:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
        - subnet: fd28:2::/48
  influxdb_backend:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.29.0.0/16
        - subnet: fd29:1::/48
  traefik:
    external: true
