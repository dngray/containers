services:
  tor-alpine:
    container_name: tor-alpine
    build:
      context: .
      dockerfile: ../../../build/podman/alpine/tor-alpine/Containerfile
    ports:
      - "127.0.0.1:9050:9050"
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime
      - ${HOME}/tor:/var/lib/tor
