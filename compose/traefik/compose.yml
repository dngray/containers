name: traefik
services:
  traefik:
    extends:
      file: ../_common/app.yml
      service: app
    build:
      context: ../../build/traefik
      dockerfile: Dockerfile
    container_name: traefik
    image: localhost/traefik
    # image: docker.io/traefik
    hostname: traefik
    read_only: true
    user: 1003:1003
    environment:
      - LEGO_CA_CERTIFICATES=/etc/traefik/certs/root.crt
      - domain=${DOMAIN}
    env_file: ./data/traefik.env
    ports:
      - 8675:8675
      - 80:8080
      - 443:4430
      - 443:4430/udp
    volumes:
      - ./data/traefik.yml:/etc/traefik/traefik.yml
      - ./data/conf.d:/etc/traefik/conf.d:ro
      - /opt/appdata/traefik/acme.json:/etc/acme/acme.json:rw
      - /opt/appdata/traefik/certs:/etc/traefik/certs:ro
    networks:
      - wg1_qbt_frontend
      - wg2_usenet_frontend
      - wg3_general_frontend
      - syncthing_1_frontend
      - syncthing_2_frontend
      - flexo_frontend
      - powerwall_pypowerwall_backend
      - grafana_frontend
      - vault_frontend
      - harbor_harbor
      - caddy_frontend
      - music_frontend

    labels:
      - traefik.enable=true
      - traefik.docker.network=http_network

networks:
  wg1_qbt_frontend:
    external: true
  wg2_usenet_frontend:
    external: true
  wg3_general_frontend:
    external: true
  syncthing_1_frontend:
    external: true
  syncthing_2_frontend:
    external: true
  flexo_frontend:
    external: true
  powerwall_pypowerwall_backend:
    external: true
  grafana_frontend:
    external: true
  vault_frontend:
    external: true
  harbor_harbor:
    external: true
  caddy_frontend:
    external: true
  music_frontend:
    external: true
