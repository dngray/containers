http:
  services:
    vault:
      loadBalancer:
        servers:
          - url: http://vault:8200

  routers:
    vault-secure:
      rule: Host(`vault.{{ env "domain" }}`)
      entryPoints:
        - https
      middlewares:
        - hsts-headers@file
        - secure-headers@file
      tls:
        certResolver: stepca
      service: vault@file
