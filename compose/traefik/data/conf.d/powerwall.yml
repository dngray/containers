http:
  services:
    grafana:
      loadBalancer:
        servers:
          - url: http://grafana:9000
    pypowerwall:
      loadBalancer:
        servers:
          - url: http://pypowerwall:8675
  routers:
    grafana-secure:
      rule: Host(`grafana.{{ env "domain" }}`)
      entryPoints:
        - https
      middlewares:
        - hsts-headers@file
        - secure-headers@file
        - grafana-secure-headers@file
      tls:
        certResolver: stepca
      service: grafana@file

    pypowerwall-secure:
      rule: Host(`grafana.{{ env "domain" }}`)
      entryPoints:
        - pypw_secure
      middlewares:
        - hsts-headers@file
        - pypowerwall-secure-headers@file
      tls:
        certResolver: stepca
      service: pypowerwall@file
