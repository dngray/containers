http:
  middlewares:
    qbittorrent-origin:
      headers:
        customRequestHeaders:
          Origin: "https://qbittorrent.{{ env "domain" }}"

  services:
    qbittorrent:
      loadBalancer:
        servers:
          - url: http://wg1:8081

  routers:
    qbittorrent-secure:
      rule: 'Host(`qbittorrent.{{ env "domain" }}`)'
      entryPoints:
        - https
      middlewares:
        - hsts-headers@file
        - secure-headers@file
        - qbittorrent-origin@file
      tls:
        certResolver: stepca
      service: qbittorrent@file
