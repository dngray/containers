http:
  services:
    btdirect:
      loadBalancer:
        servers:
          - url: http://btdirect:8081

  routers:
    btdirect-secure:
      rule: 'Host(`btdirect.{{ env "domain" }}`)'
      entryPoints:
        - https
      middlewares:
        - hsts-headers@file
        - secure-headers@file
      tls:
        certResolver: stepca
      service: btdirect@file
