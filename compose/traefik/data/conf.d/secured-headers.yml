http:
  middlewares:
    secure-headers:
      headers:
        frameDeny: true
        sslRedirect: true
        browserXssFilter: false
        contentTypeNosniff: true
        referrerPolicy: no-referrer
        customResponseHeaders:
          X-Powered-By: ""
          X-XSS-Protection: "0"

    grafana-secure-headers:
      headers:
        sslRedirect: true
        browserXssFilter: false
        contentTypeNosniff: true
        referrerPolicy: no-referrer
        customResponseHeaders:
          X-Powered-By: ""
          X-XSS-Protection: "0"
        accesscontrolalloworiginlist:
          - https://grafana.{{ env "domain" }}
