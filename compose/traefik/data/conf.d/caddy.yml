http:
  services:
    caddy:
      loadBalancer:
        servers:
          - url: http://172.33.0.2:8080

  routers:
    caddy-secure:
      rule: Host(`caddy.{{ env "domain" }}`)
      entryPoints:
        - https
      middlewares:
        - hsts-headers@file
        - secure-headers@file
      tls:
        certResolver: stepca
      service: caddy@file
