name: syncthing
services:
  syncthing1:
    extends:
      file: syncthing_common.yml
      service: syncthing_apps
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing1
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - 127.0.0.1:8384:8384
      - 22000:22000
    volumes:
      - /home/${U1}/.config/syncthing/:/config
    networks:
      frontend:
        ipv4_address: 172.24.0.2
      traefik:

  syncthing2:
    extends:
      file: syncthing_common.yml
      service: syncthing_apps
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing2
    environment:
      - PUID=1001
      - PGID=1001
    ports:
      - 127.0.0.1:8385:8384
      - 22001:22000
    volumes:
      - /home/${U2}/.config/syncthing/:/config
    networks:
      frontend:
        ipv4_address: 172.24.0.3
      traefik:

networks:
  frontend:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.24.0.0/16
        - subnet: fd24:1::/48
  traefik:
    external: true
