services:
  imapfilter:
    build:
      context: .
      dockerfile: ../../../build/docker/alpine/imapfilter/Dockerfile
    container_name: imapfilter
    command: crond -f -l 8
    volumes:
      - /mnt/data/container_data/imapfilter/cron_tasks_folder/15min:/etc/periodic/15min/:ro
      - /mnt/data/container_data/imapfilter/cron_tasks_folder/hourly:/etc/periodic/hourly/:ro
      - /home/1/.imapfilter/:/1_imapfilter
      - /home/2/.imapfilter/:/2_imapfilter
    restart: unless-stopped

networks:
  default:
    external:
      name: $DEFAULT_NETWORK
